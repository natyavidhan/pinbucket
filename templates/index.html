<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinbucket</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Pinbucket</h1>
    <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">☀️</button>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab active" data-tab="search">Search Wikipedia</button>
      <button class="tab" data-tab="identify">Identify from screenshots</button>
    </nav>

    <div id="tab-search" class="tab-panel">
      <div class="add-bar">
        <div class="search-wrapper">
          <input type="text" id="search" placeholder="Search a place on Wikipedia..." autocomplete="off">
          <div id="search-results" class="search-results hidden"></div>
        </div>
        <button id="manual-btn" class="btn-secondary">Add manually</button>
      </div>
    </div>

    <div id="tab-identify" class="tab-panel hidden">
      <div class="identify-box">
        <div id="identify-dropzone" class="dropzone">
          <div class="dropzone-inner">
            <span class="dropzone-icon">📸</span>
            <p>Drop 2-3 landscape screenshots here, click to upload, or paste from clipboard</p>
            <p class="dropzone-hint">Works best with Reel screenshots showing the scenery</p>
            <input type="file" id="identify-input" accept="image/*" multiple hidden>
          </div>
        </div>
        <div id="identify-previews" class="identify-previews"></div>
        <div id="identify-result" class="identify-result hidden"></div>
      </div>
    </div>

    <div id="preview" class="preview-card hidden">
      <div class="preview-inner">
        <img id="preview-img" src="" alt="">
        <div class="preview-info">
          <h2 id="preview-title"></h2>
          <p id="preview-desc"></p>
          <div class="preview-meta">
            <span id="preview-coords"></span>
            <a id="preview-map" href="#" target="_blank" class="map-link hidden">Open in maps</a>
          </div>
          <input type="text" id="preview-tags" placeholder="Tags: hiking, norway, waterfall">
          <div class="refs-section">
            <input type="text" id="preview-ref-input" placeholder="Reel / reference URL">
            <button id="preview-ref-add" class="btn-secondary" style="padding:8px 14px;font-size:13px;">+ Add</button>
          </div>
          <div id="preview-refs" class="refs-list"></div>
          <textarea id="preview-note" placeholder="Add a personal note..." rows="2"></textarea>
          <div class="preview-actions">
            <button id="save-btn" class="btn-primary">Save to board</button>
            <button id="cancel-preview" class="btn-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div id="manual-form" class="manual-form hidden">
      <h3>Add a place manually</h3>
      <input type="text" id="manual-name" placeholder="Place name">
      <input type="text" id="manual-image" placeholder="Image URL (optional)">
      <textarea id="manual-desc" placeholder="Description (optional)" rows="3"></textarea>
      <div class="manual-row">
        <input type="text" id="manual-lat" placeholder="Latitude (optional)">
        <input type="text" id="manual-lon" placeholder="Longitude (optional)">
      </div>
      <input type="text" id="manual-tags" placeholder="Tags: hiking, waterfall, europe">
      <div class="refs-section">
        <input type="text" id="manual-ref-input" placeholder="Reel / reference URL">
        <button id="manual-ref-add" class="btn-secondary" style="padding:8px 14px;font-size:13px;">+ Add</button>
      </div>
      <div id="manual-refs" class="refs-list"></div>
      <textarea id="manual-note" placeholder="Personal note (optional)" rows="2"></textarea>
      <button id="manual-save" class="btn-primary">Save</button>
      <button id="cancel-manual" class="btn-secondary">Cancel</button>
    </div>

    <div id="board" class="masonry"></div>
    <div id="empty" class="empty-state">No places saved yet. Search above to add your first one.</div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modal-gallery" class="modal-gallery">
        <img id="modal-img" src="" alt="">
        <button class="gallery-arrow gallery-prev">&lsaquo;</button>
        <button class="gallery-arrow gallery-next">&rsaquo;</button>
        <div class="gallery-dots"></div>
      </div>
      <div class="modal-body">
        <h2 id="modal-title"></h2>
        <div id="modal-tags" class="tag-list"></div>
        <p id="modal-desc"></p>
        <div class="modal-meta">
          <a id="modal-map" href="#" target="_blank" class="map-link hidden">Open in maps</a>
        </div>
        <div id="modal-refs" class="modal-refs"></div>
        <p id="modal-note" class="modal-note"></p>
        <div id="modal-edit" class="modal-edit hidden">
          <input type="text" id="modal-edit-tags" placeholder="Tags: hiking, norway, waterfall">
          <div class="refs-section">
            <input type="text" id="modal-edit-ref-input" placeholder="Reel / reference URL">
            <button id="modal-edit-ref-add" class="btn-secondary" style="padding:8px 14px;font-size:13px;">+ Add</button>
          </div>
          <div id="modal-edit-refs" class="refs-list"></div>
          <textarea id="modal-edit-note" placeholder="Personal note" rows="2"></textarea>
          <button id="modal-edit-save" class="btn-primary">Save changes</button>
        </div>
        <div class="modal-actions">
          <button id="modal-edit-btn" class="btn-secondary">Edit</button>
          <button id="modal-delete" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
